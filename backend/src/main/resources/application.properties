spring.application.name=nutrionista

# PostgreSQL
# P6Spy - settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:p6spy:postgresql://localhost/nutrionista}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:com.p6spy.engine.spy.P6SpyDriver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:student123}

# JPA stuff
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Enable SQL initialization
spring.sql.init.mode=always

# Disable Hibernate DDL generation to avoid conflicts
spring.jpa.hibernate.ddl-auto=none